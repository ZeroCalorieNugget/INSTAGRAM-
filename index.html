<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram 未回关筛选工具</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">本地处理 · 不上传文件</p>
          <h1>Instagram 未回关筛选工具</h1>
          <p class="intro">
            上传 Instagram 导出的 following.json 和 followers_1.json，快速找出你关注了、但对方没有关注你的用户。
          </p>
        </div>
      </header>

      <section class="upload-grid" aria-label="上传 JSON 文件">
        <div class="upload-panel" id="followingPanel">
          <div class="upload-copy">
            <h2>following.json</h2>
            <p>我正在关注的人，通常包含 relationships_following。</p>
          </div>
          <label class="file-drop" for="followingInput">
            <span class="file-icon" aria-hidden="true">↑</span>
            <span class="file-main">选择 following.json</span>
            <span class="file-name" id="followingFileName">尚未选择文件</span>
          </label>
          <input id="followingInput" type="file" accept=".json,application/json" />
          <p class="file-error" id="followingError" role="alert"></p>
        </div>

        <div class="upload-panel" id="followersPanel">
          <div class="upload-copy">
            <h2>followers_1.json</h2>
            <p>正在关注我的人，通常是包含 string_list_data 的数组。</p>
          </div>
          <label class="file-drop" for="followersInput">
            <span class="file-icon" aria-hidden="true">↑</span>
            <span class="file-main">选择 followers_1.json</span>
            <span class="file-name" id="followersFileName">尚未选择文件</span>
          </label>
          <input id="followersInput" type="file" accept=".json,application/json" />
          <p class="file-error" id="followersError" role="alert"></p>
        </div>
      </section>

      <section class="actions" aria-label="筛选操作">
        <button class="primary-button" id="compareButton" type="button">筛选未回关用户</button>
        <p id="statusMessage" class="status-message" role="status"></p>
      </section>

      <section class="results" id="resultsSection" hidden>
        <div class="stats-grid" aria-label="统计结果">
          <article class="stat-card">
            <span class="stat-label">我关注的人</span>
            <strong id="followingCount">0</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">关注我的人</span>
            <strong id="followersCount">0</strong>
          </article>
          <article class="stat-card accent">
            <span class="stat-label">没有回关我</span>
            <strong id="notFollowingBackCount">0</strong>
          </article>
        </div>

        <div class="table-toolbar">
          <label class="search-box">
            <span>搜索用户名</span>
            <input id="searchInput" type="search" placeholder="输入 username" autocomplete="off" />
          </label>
          <div class="tool-buttons">
            <button id="copyButton" type="button">复制用户名</button>
            <button id="csvButton" type="button">下载 CSV</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>用户名</th>
                <th>Instagram 链接</th>
                <th>
                  <button class="sort-button" id="sortButton" type="button">
                    关注时间 <span id="sortLabel">新到旧</span>
                  </button>
                </th>
              </tr>
            </thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>

        <p class="empty-state" id="emptyState" hidden>没有找到匹配的未回关用户。</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
